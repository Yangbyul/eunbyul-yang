name: Update Site from CV

on:
  push:
    paths:
      - 'cv/YANG_CV.docx'
      - 'presentations.json'
    branches: [master]
  workflow_dispatch:

jobs:
  parse-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx

      - name: Parse CV to JSON
        run: python scripts/parse_cv.py cv/YANG_CV.docx

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update site data from CV"
            git push
          fi
